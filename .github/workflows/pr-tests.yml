name: PR Tests

on:
  pull_request:

permissions:
  contents: read

jobs:
  firmware-host-tests:
    name: Firmware Host Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install CMake toolchain
        run: |
          sudo apt-get update
          sudo apt-get install --yes cmake build-essential

      - name: Configure firmware host tests
        run: cmake -S firmware/tests -B build/tests

      - name: Build firmware host tests
        run: cmake --build build/tests --parallel

      - name: Run firmware host tests
        run: ctest --test-dir build/tests --output-on-failure

  python-tests:
    name: Python Host Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python host dependencies
        working-directory: host/python
        run: python -m pip install -r requirements.txt

      - name: Run Python host tests
        working-directory: host/python
        run: python -m pytest -q

  dotnet-tests:
    name: .NET Host Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run .NET host tests
        working-directory: host/dotnet
        run: dotnet test PicoTrace.Tests/PicoTrace.Tests.csproj --nologo