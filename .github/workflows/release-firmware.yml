name: Release Firmware

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-firmware:
    name: Build Firmware (${{ matrix.board }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board:
          - pico
          - pico2

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install firmware build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install --yes cmake ninja-build gcc-arm-none-eabi libnewlib-arm-none-eabi

      - name: Fetch Pico SDK
        run: |
          git clone --depth 1 --branch master --recurse-submodules https://github.com/raspberrypi/pico-sdk.git "${RUNNER_TEMP}/pico-sdk"

      - name: Configure firmware build
        env:
          PICO_SDK_PATH: ${{ runner.temp }}/pico-sdk
        run: cmake -S firmware -B build/firmware-${{ matrix.board }} -G Ninja -DPICO_BOARD=${{ matrix.board }} -DPICOTRACE_FIRMWARE_VERSION=${{ github.ref_name }}

      - name: Build firmware
        env:
          PICO_SDK_PATH: ${{ runner.temp }}/pico-sdk
        run: cmake --build build/firmware-${{ matrix.board }} --parallel

      - name: Collect release artifacts
        run: |
          mkdir -p release/${{ matrix.board }}
          cp build/firmware-${{ matrix.board }}/picotrace.uf2 release/${{ matrix.board }}/picotrace-${{ matrix.board }}.uf2
          cp build/firmware-${{ matrix.board }}/picotrace.bin release/${{ matrix.board }}/picotrace-${{ matrix.board }}.bin
          cp build/firmware-${{ matrix.board }}/picotrace.elf release/${{ matrix.board }}/picotrace-${{ matrix.board }}.elf

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.board }}
          path: release/${{ matrix.board }}/

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build-firmware

    steps:
      - name: Download firmware artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/firmware-pico/picotrace-pico.uf2
            release-artifacts/firmware-pico/picotrace-pico.bin
            release-artifacts/firmware-pico/picotrace-pico.elf
            release-artifacts/firmware-pico2/picotrace-pico2.uf2
            release-artifacts/firmware-pico2/picotrace-pico2.bin
            release-artifacts/firmware-pico2/picotrace-pico2.elf

  publish-python:
    name: Publish Python Package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python packaging tools
        run: python -m pip install --upgrade build twine

      - name: Set package version from tag
        working-directory: host/python
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os

          tag = os.environ["RELEASE_TAG"]
          if not tag.startswith("v"):
              raise SystemExit(f"Expected release tag to start with 'v', got {tag!r}")

          version = tag[1:]
          pyproject = Path("pyproject.toml")
          content = pyproject.read_text(encoding="utf-8")
          content = content.replace('version = "0.1.0"', f'version = "{version}"', 1)
          pyproject.write_text(content, encoding="utf-8")
          print(f"Set Python package version to {version}")
          PY

      - name: Build Python package
        working-directory: host/python
        run: python -m build

      - name: Check Python package metadata
        working-directory: host/python
        run: python -m twine check dist/*

      - name: Publish Python package to PyPI
        working-directory: host/python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: python -m twine upload dist/*

  build-dotnet:
    name: Build .NET Host
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build .NET host with release version
        working-directory: host/dotnet
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          tag="${RELEASE_TAG}"
          version="${tag#v}"
          if [ "$version" = "$tag" ]; then
            echo "Expected release tag to start with v, got '$tag'" >&2
            exit 1
          fi

          dotnet build PicoTrace/PicoTrace.csproj --configuration Release --nologo \
            -p:Version="$version" \
            -p:InformationalVersion="$tag"